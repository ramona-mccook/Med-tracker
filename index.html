<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Med-Tracker v4.21</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --safe: #10b981; --warn: #f59e0b; --danger: #ef4444; --accent: #3b82f6; --text-muted: #64748b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; overflow-x: hidden; }
        .container { max-width: 480px; margin: auto; padding: 15px; padding-top: 70px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03); position: relative; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 15px; z-index: 1000; }
        .menu-btn { font-size: 1.5rem; cursor: pointer; background: none; border: none; padding: 10px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--primary); color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .sidebar-item { padding: 15px 25px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        
        .status-banner { padding: 16px; border-radius: 14px; text-align: center; font-weight: 900; color: white; text-transform: uppercase; margin-bottom: 15px; font-size: 0.8rem; }
        .status-safe { background: var(--safe); } .status-danger { background: var(--danger); }
        h2 { font-size: 0.75rem; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
        
        /* Graph Styles */
        .usage-chart { display: flex; align-items: flex-end; gap: 8px; height: 100px; padding-top: 20px; margin-bottom: 10px; }
        .usage-bar { flex: 1; background: var(--accent); border-radius: 4px 4px 0 0; position: relative; min-height: 2px; }
        .usage-bar::after { content: attr(data-label); position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 0.55rem; color: var(--text-muted); font-weight: bold; }
        .usage-bar::before { content: attr(data-val); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; font-weight: 900; color: var(--primary); }
        
        .inventory-viz { height: 24px; background: #e2e8f0; border-radius: 12px; overflow: hidden; display: flex; margin: 10px 0; }
        .viz-taken { background: var(--accent); height: 100%; transition: 0.6s; }
        .viz-remaining { background: var(--safe); height: 100%; transition: 0.6s; }

        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header hidden" id="mainHeader">
    <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
    <div style="flex-grow: 1; text-align: right; font-weight: 900; font-size: 0.8rem; letter-spacing: 1px;">MED-TRACKER v4.21</div>
</div>

<div class="overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-item" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="sidebar-item" onclick="switchTab('log')">Log</div>
    <div class="sidebar-item" onclick="switchTab('profile')">Profile</div>
    <div class="sidebar-item" onclick="switchTab('info')">Getting Started</div>
    <div class="sidebar-item" onclick="switchTab('help')">Help</div>
    <div class="sidebar-item" onclick="switchTab('admin')">Admin</div>
    <div style="position: absolute; bottom: 20px; width: 100%;" class="sidebar-item" onclick="location.reload()">Logout</div>
</div>

<div class="container">
    <div id="view-auth">
        <div class="card">
            <h2>Login</h2>
            <input type="text" id="authUser" placeholder="Username">
            <input type="password" id="authPass" placeholder="Password">
            <button class="btn-action" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="view-main" class="hidden">
        <div id="tab-dashboard">
            <div id="alertBanner" class="status-banner">Loading...</div>
            
            <div class="card">
                <h2>7-Day Usage History</h2>
                <div class="usage-chart" id="usageChart"></div>
            </div>

            <div class="card">
                <h2>Inventory vs. Total Taken</h2>
                <div class="inventory-viz">
                    <div id="vizTaken" class="viz-taken" style="width: 0%"></div>
                    <div id="vizRemaining" class="viz-remaining" style="width: 100%"></div>
                </div>
                <div style="display:flex; justify-content: space-between; font-size: 0.65rem; font-weight: 800;">
                    <span style="color:var(--accent)">TOTAL TAKEN: <span id="txtTotalTaken">0</span></span>
                    <span style="color:var(--safe)">REMAINING: <span id="txtRemaining">0</span></span>
                </div>
            </div>

            <div class="card" style="background: #fdf2f2; border-left: 4px solid var(--danger);">
                <h2>Depletion Forecast</h2>
                <div id="depletionAnalysis" style="font-size: 1.1rem; font-weight: 900; color: var(--danger);">--</div>
            </div>
        </div>

        <div id="tab-log" class="hidden">
            <div class="card">
                <h2>Log Intake</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Date</label><input type="date" id="logDate"></div>
                    <div><label>Amount</label><input type="number" id="logAmt" value="1" step="0.5"></div>
                </div>
                <textarea id="logNote" placeholder="Notes..." style="width:100%; border:2px solid #f1f5f9; border-radius:10px; padding:10px;"></textarea>
                <button class="btn-action" onclick="addDose()">SUBMIT</button>
            </div>
        </div>

        <div id="tab-profile" class="hidden"></div>
        <div id="tab-info" class="hidden"></div>
        <div id="tab-help" class="hidden"></div>
        <div id="tab-admin" class="hidden"></div>
    </div>
</div>

<script>
    const STORAGE_KEY_AUTH = 'rx_auth_registry';
    const STORAGE_KEY_DATA_PREFIX = 'rx_data_';
    let activeUser = null;

    function toggleMenu(show) {
        document.getElementById('sidebar').classList.toggle('open', show);
        document.getElementById('menuOverlay').style.display = show ? 'block' : 'none';
    }

    function switchTab(tabId) {
        ['dashboard', 'log', 'profile', 'info', 'help', 'admin'].forEach(t => document.getElementById(`tab-${t}`)?.classList.add('hidden'));
        document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        toggleMenu(false);
        refreshUI();
    }

    function handleLogin() {
        const user = document.getElementById('authUser').value.trim().toLowerCase();
        activeUser = user;
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
        document.getElementById('mainHeader').classList.remove('hidden');
        refreshUI();
    }

    function getData() { 
        let d = JSON.parse(localStorage.getItem(STORAGE_KEY_DATA_PREFIX + activeUser) || '{"stock":0,"max":0,"logs":[],"refillHistory":[]}');
        return d;
    }

    function refreshUI() {
        const d = getData();
        const todayStr = new Date().toISOString().split('T')[0];

        // 1. Inventory vs Taken Logic
        const totalTakenEver = d.logs.reduce((sum, l) => sum + parseFloat(l.val), 0);
        const totalPossible = d.stock + totalTakenEver;
        const takenPerc = totalPossible > 0 ? (totalTakenEver / totalPossible) * 100 : 0;
        
        document.getElementById('vizTaken').style.width = takenPerc + "%";
        document.getElementById('vizRemaining').style.width = (100 - takenPerc) + "%";
        document.getElementById('txtTotalTaken').innerText = totalTakenEver.toFixed(1);
        document.getElementById('txtRemaining').innerText = d.stock.toFixed(1);

        // 2. 7-Day Usage Graph Logic
        const chart = document.getElementById('usageChart');
        chart.innerHTML = '';
        const last7Days = [...Array(7)].map((_, i) => {
            const date = new Date();
            date.setDate(date.getDate() - i);
            return date.toISOString().split('T')[0];
        }).reverse();

        const maxUsage = Math.max(...last7Days.map(date => 
            d.logs.filter(l => l.date === date).reduce((s, l) => s + parseFloat(l.val), 0)
        ), 1);

        last7Days.forEach(date => {
            const dayTotal = d.logs.filter(l => l.date === date).reduce((s, l) => s + parseFloat(l.val), 0);
            const height = (dayTotal / maxUsage) * 100;
            const bar = document.createElement('div');
            bar.className = 'usage-bar';
            bar.style.height = height + '%';
            bar.setAttribute('data-label', date.split('-')[2]); // Day number
            bar.setAttribute('data-val', dayTotal);
            chart.appendChild(bar);
        });

        // Depletion Calculation
        const daysLeft = d.max > 0 ? (d.stock / d.max) : 0;
        const runOutDate = new Date();
        runOutDate.setDate(runOutDate.getDate() + Math.floor(daysLeft));
        document.getElementById('depletionAnalysis').innerText = daysLeft < 1 ? "DEPLETED" : runOutDate.toLocaleDateString();
        
        const banner = document.getElementById('alertBanner');
        banner.className = `status-banner ${d.stock > 0 ? 'status-safe' : 'status-danger'}`;
        banner.innerText = d.stock > 0 ? "System Active" : "Stock Alert";
    }

    function addDose() {
        const d = getData();
        const amt = parseFloat(document.getElementById('logAmt').value) || 0;
        if(amt > d.stock) { alert("Insufficient Stock"); return; }
        d.stock -= amt;
        d.logs.unshift({ date: document.getElementById('logDate').value, val: amt });
        localStorage.setItem(STORAGE_KEY_DATA_PREFIX + activeUser, JSON.stringify(d));
        refreshUI();
    }
</script>
</body>
</html>
