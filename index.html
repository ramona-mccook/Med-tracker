<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Med-Tracker v4.24</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0f172a; --safe: #10b981; --warn: #f59e0b; --danger: #ef4444; --accent: #3b82f6; --text-muted: #64748b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; overflow-x: hidden; }
        .container { max-width: 480px; margin: auto; padding: 15px; padding-top: 75px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03); position: relative; }
        
        .header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 15px; z-index: 1000; }
        .menu-btn { font-size: 1.5rem; cursor: pointer; background: none; border: none; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .page-title { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: var(--primary); color: white; transition: 0.3s; z-index: 2000; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .sidebar-item { padding: 15px 25px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        
        label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        .hidden { display: none !important; }
        .status-banner { padding: 16px; border-radius: 14px; text-align: center; font-weight: 900; color: white; text-transform: uppercase; margin-bottom: 15px; font-size: 0.8rem; }
        .status-safe { background: var(--safe); } .status-danger { background: var(--danger); }
    </style>
</head>
<body>

<div class="header hidden" id="mainHeader">
    <button class="menu-btn" onclick="toggleMenu(true)">
        <span>☰</span>
        <span class="page-title" id="activePageTitle">DASHBOARD</span>
    </button>
</div>

<div class="overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="sidebar" id="sidebar">
    <div id="mi-info" class="sidebar-item" onclick="switchTab('info', 'Getting Started')">Getting Started</div>
    <div class="sidebar-item" onclick="switchTab('dashboard', 'Dashboard')">Dashboard</div>
    <div id="mi-log" class="sidebar-item hidden" onclick="switchTab('log', 'Log')">Log</div>
    <div id="mi-inv" class="sidebar-item hidden" onclick="switchTab('inventory', 'Inventory')">Inventory</div>
    <div id="mi-profile" class="sidebar-item hidden" onclick="switchTab('profile', 'Profile')">Profile</div>
    <div class="sidebar-item" onclick="switchTab('help', 'Help')">Help</div>
    <div class="sidebar-item" onclick="switchTab('admin', 'Admin')">Admin</div>
    <div style="position: absolute; bottom: 20px; width: 100%;" class="sidebar-item" onclick="location.reload()">Logout</div>
</div>

<div class="container">
    <div id="view-auth">
        <div class="card">
            <h2>Login</h2>
            <input type="text" id="authUser" placeholder="Username">
            <input type="password" id="authPass" placeholder="Password">
            <button class="btn-action" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="view-main" class="hidden">
        
        <div id="tab-info">
            <div class="card">
                <h2>Welcome</h2>
                <p style="font-size:0.8rem;">To enable full features, please complete the initial setup below. All fields are required.</p>
            </div>
            <div class="card">
                <h2>Initial Setup</h2>
                <label>On-Hand Stock</label>
                <input type="number" id="gsStock" placeholder="Units currently in possession">
                <label>Daily Goal</label>
                <input type="number" id="gsGoal" placeholder="Recommended units/day">
                <label>Daily Max</label>
                <input type="number" id="gsMax" placeholder="Limit for alert system">
                <button class="btn-action" onclick="completeInitialSetup()">Save & Finish</button>
            </div>
        </div>

        <div id="tab-dashboard" class="hidden">
            <div id="onboardingPrompt" class="hidden">
                <button class="btn-action" style="background:var(--warn); margin-bottom: 15px;" onclick="switchTab('info', 'Getting Started')">⚠️ Complete Initial Setup</button>
            </div>
            <div id="alertBanner" class="status-banner">Loading...</div>
            </div>

        <div id="tab-log" class="hidden">
            <div class="card">
                <h2>Log Intake</h2>
                <input type="date" id="logDate">
                <input type="number" id="logAmt" value="1">
                <button class="btn-action" onclick="addDose()">Submit</button>
            </div>
        </div>

        <div id="tab-inventory" class="hidden">
            <div class="card">
                <h2>Stock Management</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Current: <b id="invCurrent">0</b> units</p>
                <label>Add Refill</label>
                <input type="number" id="refillAmt" placeholder="Refill quantity">
                <button class="btn-action" onclick="applyRefill()">Apply Refill</button>
            </div>
        </div>

        <div id="tab-profile" class="hidden">
            <div class="card"><h2>Profile & Goals</h2></div>
        </div>

        </div>
</div>

<script>
    const STORAGE_KEY_DATA_PREFIX = 'rx_data_';
    let activeUser = null;

    function toggleMenu(show) {
        document.getElementById('sidebar').classList.toggle('open', show);
        document.getElementById('menuOverlay').style.display = show ? 'block' : 'none';
    }

    function switchTab(tabId, title) {
        ['dashboard', 'log', 'profile', 'info', 'inventory', 'help', 'admin'].forEach(t => document.getElementById(`tab-${t}`)?.classList.add('hidden'));
        document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        document.getElementById('activePageTitle').innerText = title;
        toggleMenu(false);
        refreshMenuVisibility();
    }

    function handleLogin() {
        activeUser = document.getElementById('authUser').value.trim().toLowerCase();
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
        document.getElementById('mainHeader').classList.remove('hidden');
        
        const d = getData();
        if (d.setupComplete) switchTab('dashboard', 'Dashboard');
        else switchTab('info', 'Getting Started');
        
        refreshMenuVisibility();
    }

    function getData() { 
        return JSON.parse(localStorage.getItem(STORAGE_KEY_DATA_PREFIX + activeUser) || '{"stock":0,"max":0,"goal":0,"logs":[],"setupComplete":false}');
    }

    function refreshMenuVisibility() {
        const d = getData();
        const hasSetup = d.setupComplete;

        // Menu visibility logic
        document.getElementById('mi-info').classList.toggle('hidden', hasSetup);
        document.getElementById('mi-log').classList.toggle('hidden', !hasSetup);
        document.getElementById('mi-inv').classList.toggle('hidden', !hasSetup);
        document.getElementById('mi-profile').classList.toggle('hidden', !hasSetup);
        
        // Update Inventory Tab text
        if(hasSetup) document.getElementById('invCurrent').innerText = d.stock;
    }

    function completeInitialSetup() {
        const s = parseFloat(document.getElementById('gsStock').value);
        const g = parseFloat(document.getElementById('gsGoal').value);
        const m = parseFloat(document.getElementById('gsMax').value);

        if (isNaN(s) || isNaN(g) || isNaN(m)) {
            alert("All fields in Initial Setup are required.");
            return;
        }

        let d = getData();
        d.stock = s;
        d.goal = g;
        d.max = m;
        d.setupComplete = true;
        
        localStorage.setItem(STORAGE_KEY_DATA_PREFIX + activeUser, JSON.stringify(d));
        alert("Setup complete!");
        switchTab('dashboard', 'Dashboard');
    }

    function applyRefill() {
        const amt = parseFloat(document.getElementById('refillAmt').value) || 0;
        let d = getData();
        d.stock += amt;
        localStorage.setItem(STORAGE_KEY_DATA_PREFIX + activeUser, JSON.stringify(d));
        document.getElementById('refillAmt').value = "";
        refreshMenuVisibility();
    }

    // Reuse existing addDose, toggleEdit, etc from previous versions...
</script>
</body>
</html>
